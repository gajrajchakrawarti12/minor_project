spring.application.name=backend

# Server configuration
server.port=8081
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=60s

# Timetable generation safety timeout (milliseconds)
app.timetable.max-generation-ms=${TIMETABLE_MAX_GENERATION_MS:300000}

# Allow using teachers from other departments when local pool is constrained.
app.timetable.allow-cross-department-teachers=${TIMETABLE_ALLOW_CROSS_DEPARTMENT_TEACHERS:false}

# Database configuration
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:minor_project}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:<password>}

# JPA configuration
spring.jpa.hibernate.ddl-auto=update

# JWT secret
app.auth.jwt.secret=${JWT_SECRET:115548+64684dfakjgkj.bgghlaegbregheb.g.bflkab;bgajkf aj,gkjdfg}
app.auth.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
app.auth.cookie.name=${AUTH_COOKIE_NAME:token}
app.auth.cookie.secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie.same-site=${AUTH_COOKIE_SAME_SITE:Lax}

logging.level.com.backend.models.autogeneration.GenerationService=DEBUG

